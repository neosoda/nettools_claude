name: build
on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest && wails build -platform windows/amd64
