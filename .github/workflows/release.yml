name: release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: go test ./...
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest && wails build -platform windows/amd64
      - name: Generate changelog
        shell: bash
        run: git log --pretty=format:'- %s (%h)' $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~20)..HEAD > RELEASE_CHANGELOG.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_CHANGELOG.md
          files: build/bin/*
